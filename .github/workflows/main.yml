name: "Fetch from IPFS and Commit"

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download entire folder as a zip file from IPFS
        run: |
          echo "Downloading the IPFS folder as a single zip file..."
          curl -L -o penguin_folder.zip "https://ipfs.io/ipfs/QmNf1UsmdGaMbpatQ6toXSkzDpizaGmC9zfunCyoz1enD5/penguin/?format=raw"
          echo "Download completed. File size:"
          ls -lh penguin_folder.zip

      - name: (Optional) Unzip to see contents (for debugging)
        run: |
          echo "Unzipping to check contents..."
          unzip -l penguin_folder.zip || echo "File is not a zip archive, will commit as is."

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add penguin_folder.zip
          git commit -m "Add IPFS folder as zip file" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
