name: "Fetch IPFS Folder as CAR File"

on:
  workflow_dispatch:

jobs:
  fetch-ipfs-folder:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download the entire folder as a single CAR file
        run: |
          echo "Downloading the IPFS folder as a CAR file..."
          curl -L -o penguin_folder.car "https://ipfs.io/ipfs/QmNf1UsmdGaMbpatQ6toXSkzDpizaGmC9zfunCyoz1enD5?format=car"
          echo "Download completed. File size:"
          ls -lh penguin_folder.car

      - name: Verify file exists and is not empty
        run: |
          if [ ! -s penguin_folder.car ]; then
            echo "Error: File penguin_folder.car is empty or does not exist!"
            exit 1
          fi
          echo "File verification passed."

      - name: Commit and Push the CAR file to GitHub
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add penguin_folder.car
          git status
          git diff --cached --quiet || git commit -m "Add IPFS folder as a CAR file [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
